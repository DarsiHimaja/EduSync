<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduSync — Profile</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="profile-wrap">
    <p class="section-title" style="margin-bottom:1.5rem">My <span>Profile</span></p>

    <!-- Avatar + info -->
    <div class="card" style="display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap">
      <div class="profile-avatar-big" id="profile-avatar">U</div>
      <div>
        <h2 id="profile-name" style="font-size:1.5rem;font-weight:800;margin-bottom:0.3rem"></h2>
        <p style="color:var(--muted);font-size:0.9rem">EduSync</p>
        <p id="profile-joined" style="color:var(--muted);font-size:0.8rem;margin-top:0.3rem"></p>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid-3" style="margin-bottom:2rem" id="profile-stats"></div>

    <!-- Achievements -->
    <div class="card" style="margin-bottom:2rem">
      <p style="font-weight:700;margin-bottom:1rem">🏆 Achievements</p>
      <div style="display:flex;gap:1rem;flex-wrap:wrap" id="achievements"></div>
    </div>

    <!-- Danger zone -->
    <div class="card" style="border-color:rgba(255,107,107,0.3)">
      <p style="font-weight:700;margin-bottom:0.5rem;color:var(--danger)">⚠️ Danger Zone</p>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1rem">Clear all your saved progress data. This cannot be undone.</p>
      <button class="btn btn-danger btn-sm" onclick="clearAllData()">Clear All Progress</button>
    </div>
  </div>

  <footer>© 2024 EduSync</footer>

  <script src="/static/js/app.js"></script>
  <script>
    requireAuth();
    buildSidebar("Profile");

    const user = getUser() || "Student";
    document.getElementById("profile-avatar").textContent = user[0].toUpperCase();
    document.getElementById("profile-name").textContent   = user;
    document.getElementById("profile-joined").textContent = "Member since " + new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" });

    async function loadProfile() {
      let courses = [];
      try { courses = await dbGetCourses(); } catch(e) {}

      courses.forEach(c => {
        c.totalWeeks = (c.meta && c.meta.totalWeeks) || 1;
        c.weeksDone  = (c.meta && c.meta.weeksDone)  || 0;
        c.level      = (c.meta && c.meta.level)      || c.level || "";
      });

      const total            = courses.length;
      const done             = courses.filter(c => c.weeksDone >= c.totalWeeks).length;
      const totalWeeksStudied = courses.reduce((s,c) => s + c.weeksDone, 0);
      const avgPct           = total ? Math.round(courses.reduce((s,c) => s+(c.weeksDone/c.totalWeeks)*100,0)/total) : 0;

      document.getElementById("profile-stats").innerHTML = `
        <div class="profile-stat"><div class="val">${total}</div><div class="lbl">Courses Saved</div></div>
        <div class="profile-stat"><div class="val">${done}</div><div class="lbl">Completed</div></div>
        <div class="profile-stat"><div class="val">${totalWeeksStudied}</div><div class="lbl">Weeks Studied</div></div>`;

      const badges = [
        { icon: "🎓", label: "First Course",  unlocked: total >= 1 },
        { icon: "🔥", label: "3 Courses",     unlocked: total >= 3 },
        { icon: "✅", label: "Completed One", unlocked: done >= 1 },
        { icon: "📅", label: "10 Weeks",      unlocked: totalWeeksStudied >= 10 },
        { icon: "🏆", label: "Top Student",   unlocked: done >= 3 },
        { icon: "⭐", label: "50 Weeks",      unlocked: totalWeeksStudied >= 50 },
      ];
      document.getElementById("achievements").innerHTML = badges.map(b => `
        <div style="text-align:center;opacity:${b.unlocked?1:0.3};transition:opacity 0.2s">
          <div style="font-size:2rem">${b.icon}</div>
          <div style="font-size:0.75rem;color:var(--muted);margin-top:0.3rem">${b.label}</div>
        </div>`).join("");
    }

    loadProfile();

    async function clearAllData() {
      if (!confirm("Are you sure? This will delete all your saved courses and progress.")) return;
      try {
        const courses = await dbGetCourses();
        await Promise.all(courses.map(c => dbDeleteCourse(c.course_id)));
        loadProfile();
      } catch(e) { alert("Failed to clear data."); }
    }
  </script>
</body>
</html>
